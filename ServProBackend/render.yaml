services:
  - type: web
    name: servpro-backend
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_AI_SERVICE
        value: https://chatbot-ai-smpu.onrender.com
      - key: PYTHON_AI_TIMEOUT_MS
        value: 20000
      - key: PYTHON_AI_RETRIES
        value: 3
      - key: PYTHON_AI_RETRY_BASE_DELAY_MS
        value: 2000
      - key: PYTHON_AI_HEALTH_TIMEOUT_MS
        value: 15000
      - key: PYTHON_AI_HEALTH_RETRIES
        value: 2
      - key: PYTHON_AI_WARMUP_ON_START
        value: "true"
      - key: PYTHON_AI_WARMUP_TIMEOUT_MS
        value: 30000
      - key: PYTHON_AI_WARMUP_ENDPOINT
        value: /health

  - type: web
    name: servpro-python-ai
    runtime: docker
    rootDir: python_ai
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
