# ServPro client app container

name: servpro-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servpro-frontend
    restart: unless-stopped
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "5173:5173"

