apiVersion: v1
kind: ConfigMap
metadata:
  name: servpro-config
  namespace: servpro
data:
  NODE_ENV: production
  PORT: "4000"
  MONGODB_URI: mongodb://mongodb:27017/servpro
  PYTHON_AI_SERVICE: http://python-ai:5000
  CORS_ORIGINS: https://dashboard.servpro.tn,https://app.servpro.tn,https://dashboard.servpro.local,https://app.servpro.local,http://localhost:5173,http://localhost:5174
  # This value is exposed to browser clients by Vite.
  VITE_API_BASE_URL: https://api.servpro.tn
