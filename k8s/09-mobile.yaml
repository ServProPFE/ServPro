apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile
  namespace: servpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile
  template:
    metadata:
      labels:
        app: mobile
    spec:
      containers:
        - name: mobile
          image: servpro-mobile:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
            - containerPort: 19000
            - containerPort: 19001
          env:
            - name: NODE_ENV
              value: development
            - name: SKIP_ENV_VALIDATION
              value: "true"
            - name: EXPO_DEBUG
              value: "false"
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mobile
  namespace: servpro
spec:
  selector:
    app: mobile
  ports:
    - name: metro-web
      port: 8081
      targetPort: 8081
    - name: expo-dev
      port: 19000
      targetPort: 19000
    - name: expo-bundler
      port: 19001
      targetPort: 19001
