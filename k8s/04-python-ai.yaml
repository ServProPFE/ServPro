apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ai
  namespace: servpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ai
  template:
    metadata:
      labels:
        app: python-ai
    spec:
      containers:
        - name: python-ai
          image: servpro-python-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: servpro-secret
                  key: GEMINI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: python-ai
  namespace: servpro
spec:
  selector:
    app: python-ai
  ports:
    - name: http
      port: 5000
      targetPort: 5000
