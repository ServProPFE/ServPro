apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: servpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: servpro-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: servpro-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: servpro-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: servpro
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 4000
      targetPort: 4000
