services:
  - type: web
    runtime: docker
    name: servpro-backend
    rootDir: ServProBackend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_AI_SERVICE
        value: https://chatbot-ai-smpu.onrender.com,https://servpro-python-ai.onrender.com
      - key: PYTHON_AI_TIMEOUT_MS
        value: 20000
      - key: PYTHON_AI_RETRIES
        value: 3
      - key: PYTHON_AI_RETRY_BASE_DELAY_MS
        value: 2000
      - key: PYTHON_AI_HEALTH_TIMEOUT_MS
        value: 20000
      - key: PYTHON_AI_HEALTH_RETRIES
        value: 3
      - key: PRODUCTION_AUTO_SEED
        value: "true"
      - key: PRODUCTION_SEED_DEFAULT_PASSWORD
        sync: false

  - type: web
    runtime: docker
    name: servpro-python-ai
    rootDir: python_ai
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MANUAL_FEEDBACK_ENABLED
        value: "false"
      - key: BACKEND_CONTEXT_ENABLED
        value: "true"
      - key: BACKEND_CONTEXT_BASE_URL
        sync: false
