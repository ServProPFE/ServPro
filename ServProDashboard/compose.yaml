# ServPro dashboard container (provider/admin back office)

name: servpro-dashboard

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servpro-dashboard
    restart: unless-stopped
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "5174:5174"

